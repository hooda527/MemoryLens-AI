name: memorylens_ai
description: "MemoryLens AI — AI-powered document understanding, smart reminders, and live dashboards."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  # Secure storage
  flutter_secure_storage: ^9.2.2
  # Notifications
  flutter_local_notifications: ^17.2.4
  # File handling
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  desktop_drop: ^0.4.4
  # Window management (desktop)
  window_manager: ^0.3.9
  # Networking
  http: ^1.2.2
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  # Firebase
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.6
  firebase_auth: ^5.5.1
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
